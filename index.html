    <style>
        /* جميع الأنماط كما هي مع إضافة زر المسح */
        :root {

        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,82,82,0.7); }
            70% { box-shadow: 0 0 0 12px rgba(255,82,82,0); }

        #recording-timer {
            position: absolute;

            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 8px 18px;

            border: 1px solid var(--danger);
            z-index: 20;
            display: none;
        }
        .error-toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(230,70,70,0.9);
            backdrop-filter: blur(8px);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 200;
            animation: fadeInOut 3s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
        #image-upload { display: none; }
    </style>
</head>
<body>
    <!-- شاشة الإذن -->
    <div id="permission-overlay">
        <h2>AR الرسم الاحترافي</h2>
        <p>ابدأ الرسم بالتتبع المباشر بدقة تصل إلى 4K، مع تسجيل سلس 30 إطار/ثانية.</p>
        <button id="start-camera-btn">▶ تشغيل الكاميرا</button>
    </div>

    <video id="camera-feed" autoplay playsinline muted></video>
    <div id="image-container"><img id="trace-image" alt="مرجع"></div>
    <canvas id="drawing-canvas"></canvas>

    <!-- الشريط العلوي -->
    <div id="top-bar">
        <span class="chip active" data-res="1080">1080p</span>
        <span class="chip" data-res="720">720p</span>
        <span class="chip" data-ratio="16:9">16:9</span>
        <span class="chip" data-ratio="9:16">9:16</span>
        <span class="chip" data-ratio="1:1">1:1</span>
    </div>

    <div id="toggle-ui">⚙️</div>
    <div id="ui-panel" class="hidden">
        <div class="row">
            <label for="image-upload" class="btn"><span>📁</span><span>رفع</span></label>
            <input type="file" id="image-upload" accept="image/*">
            <div class="btn" id="lock-btn"><span>🔓</span><span>قفل</span></div>
            <div class="btn" id="undo-btn"><span>↩️</span><span>تراجع</span></div>
            <!-- زر مسح البيانات الجديد -->
            <div class="btn danger" id="reset-data-btn"><span>🧹</span><span>مسح البيانات</span></div>
        </div>
        <div class="row">
            <div class="btn danger" id="clear-btn"><span>🗑️</span><span>مسح الرسم</span></div>
            <div class="btn primary-bg" id="save-btn"><span>🖼️</span><span>صورة</span></div>
            <div class="btn" id="record-btn"><span>⏺️</span><span>تسجيل</span></div>
        </div>
        <div class="slider-group">
            <label>الشفافية</label>
            <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.5">
            <span id="opacity-value">0.5</span>
        </div>
        <div class="slider-group">
            <label>التكبير</label>
            <input type="range" id="scale-slider" min="0.3" max="3" step="0.1" value="1">
            <span id="scale-value">1.0</span>
        </div>
        <div class="slider-group">
            <input type="color" id="color-picker" value="#00e676">
            <label>الحجم</label>
            <input type="range" id="brush-size" min="1" max="20" value="3">
            <span id="brush-value">3</span>
        </div>
    </div>

    <div id="recording-timer">00:00</div>

    <script>
        (function() {
            'use strict';

            // --- عناصر الصفحة ---
            const overlay = document.getElementById('permission-overlay');
            const startBtn = document.getElementById('start-camera-btn');
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('drawing-canvas');
            const ctx = canvas.getContext('2d');
            const uiPanel = document.getElementById('ui-panel');
            const toggleBtn = document.getElementById('toggle-ui');
            const imageContainer = document.getElementById('image-container');
            const traceImage = document.getElementById('trace-image');
            const imageUpload = document.getElementById('image-upload');
            const opacitySlider = document.getElementById('opacity-slider');
            const scaleSlider = document.getElementById('scale-slider');
            const lockBtn = document.getElementById('lock-btn');
            const undoBtn = document.getElementById('undo-btn');
            const clearBtn = document.getElementById('clear-btn');
            const resetDataBtn = document.getElementById('reset-data-btn');
            const saveBtn = document.getElementById('save-btn');
            const recordBtn = document.getElementById('record-btn');
            const colorPicker = document.getElementById('color-picker');
            const brushSize = document.getElementById('brush-size');
            const timerDiv = document.getElementById('recording-timer');

            // --- متغيرات الحالة ---
            let isDrawing = false;
            let lastX = 0, lastY = 0;
            let paths = [];
            let currentPath = [];

            let isImageLocked = false;
            let currentScale = 1;
            let translateX = 0, translateY = 0;
            let isDraggingImage = false;
            let dragStartX = 0, dragStartY = 0;

            let currentRes = '1080';
            let currentRatio = '16:9';
            let canvasWidth = 1920, canvasHeight = 1080;

            // التسجيل
            let mediaRecorder = null;
            let recordedChunks = [];
            let isRecording = false;
            let recordInterval = null;       // نستخدم setInterval بدلاً من requestAnimationFrame
            const recordCanvas = document.createElement('canvas');
            const recordCtx = recordCanvas.getContext('2d');
            let recordingStartTime = 0;
            let timerInterval = null;

            // UI
            let uiVisible = false;

            // --- تحديث القيم ---
            document.getElementById('opacity-value').innerText = opacitySlider.value;
            document.getElementById('scale-value').innerText = scaleSlider.value;
            document.getElementById('brush-value').innerText = brushSize.value;

            // --- دالة مسح جميع البيانات (إعادة تعيين كاملة) ---
            function resetAllData() {
                // مسح المسارات
                paths = [];
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // إعادة تعيين الصورة المرجعية
                traceImage.src = '';
                imageContainer.style.display = 'none';
                currentScale = 1;
                translateX = 0;
                translateY = 0;
                scaleSlider.value = '1';
                document.getElementById('scale-value').innerText = '1.0';
                updateImageTransform();

                // إعادة تعيين لون الفرشاة والحجم إلى الافتراضي
                colorPicker.value = '#00e676';
                brushSize.value = '3';
                document.getElementById('brush-value').innerText = '3';

                // إعادة تعيين الشفافية
                opacitySlider.value = '0.5';
                traceImage.style.opacity = '0.5';
                document.getElementById('opacity-value').innerText = '0.5';

                // إعادة تعيين القفل
                if (isImageLocked) {
                    isImageLocked = false;
                    imageContainer.classList.remove('locked');
                    lockBtn.classList.remove('active-toggle');
                    lockBtn.innerHTML = '<span>🔓</span><span>قفل</span>';
                }

                // إلغاء أي تسجيل قيد التشغيل
                if (isRecording) {
                    stopRecording();
                }

                // عرض رسالة تأكيد
                showToast('تم مسح جميع البيانات');
            }

            function showToast(msg) {
                const toast = document.createElement('div');
                toast.className = 'error-toast';
                toast.style.background = '#00e676';
                toast.style.color = '#000';
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }

            // --- دالة إيقاف التسجيل (للاستخدام الداخلي) ---
            function stopRecording() {
                if (!isRecording) return;
                isRecording = false;
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                if (recordInterval) {
                    clearInterval(recordInterval);
                    recordInterval = null;
                }
                clearInterval(timerInterval);
                timerDiv.style.display = 'none';
                recordBtn.classList.remove('recording-indicator');
                recordBtn.innerHTML = '<span>⏺️</span><span>تسجيل</span>';
            }

            function updateDimensions() {
                if (currentRes === '1080') {
                    if (currentRatio === '16:9') { canvasWidth = 1920; canvasHeight = 1080; }
                    else if (currentRatio === '9:16') { canvasWidth = 1080; canvasHeight = 1920; }
                    else if (currentRatio === '1:1') { canvasWidth = 1080; canvasHeight = 1080; }
                } else {
                    if (currentRatio === '16:9') { canvasWidth = 1280; canvasHeight = 720; }
                    else if (currentRatio === '9:16') { canvasWidth = 720; canvasHeight = 1280; }
                    else if (currentRatio === '1:1') { canvasWidth = 720; canvasHeight = 720; }
                }
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                recordCanvas.width = canvasWidth;
                recordCanvas.height = canvasHeight;
                redrawPaths();
            }

            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let canvasX = (clientX - rect.left) * scaleX;
                let canvasY = (clientY - rect.top) * scaleY;
                canvasX = Math.min(canvas.width, Math.max(0, canvasX));
                canvasY = Math.min(canvas.height, Math.max(0, canvasY));
                return [canvasX, canvasY];
            }

            function redrawPaths() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                paths.forEach(path => {
                    if (path.length === 0) return;
                    ctx.beginPath();
                    ctx.moveTo(path[0].x, path[0].y);
                    for (let i = 1; i < path.length; i++) {
                        ctx.lineTo(path[i].x, path[i].y);
                    }
                    ctx.strokeStyle = path[0].color || '#00e676';
                    ctx.lineWidth = path[0].size || 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                });
            }

            // --- أحداث الرسم ---
            function startDrawing(e) {
                e.preventDefault();
                isDrawing = true;
                const [x, y] = getCanvasCoords(e);
                lastX = x; lastY = y;
                currentPath = [{
                    x, y,
                    color: colorPicker.value,
                    size: parseInt(brushSize.value, 10)
                }];
            }
            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                const [x, y] = getCanvasCoords(e);
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = brushSize.value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                currentPath.push({ x, y });
                lastX = x; lastY = y;
            }
            function stopDrawing() {
                if (isDrawing) {
                    isDrawing = false;
                    if (currentPath.length > 0) paths.push([...currentPath]);
                    currentPath = [];
                }
            }
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
            canvas.addEventListener('touchcancel', stopDrawing);
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);

            // --- أزرار الرسم ---
            undoBtn.addEventListener('click', () => { paths.pop(); redrawPaths(); });
            clearBtn.addEventListener('click', () => { paths = []; ctx.clearRect(0,0,canvas.width,canvas.height); });
            saveBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = `ar-drawing-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            // --- زر مسح البيانات ---
            resetDataBtn.addEventListener('click', resetAllData);

            // --- رفع الصورة ---
            imageUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    traceImage.src = ev.target.result;
                    imageContainer.style.display = 'block';
                    currentScale = 1; translateX = 0; translateY = 0;
                    scaleSlider.value = '1';
                    document.getElementById('scale-value').innerText = '1.0';
                    updateImageTransform();
                };
                reader.readAsDataURL(file);
            });
            function updateImageTransform() {
                imageContainer.style.transform = `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${currentScale})`;
            }
            function onDragStart(e) {
                if (isImageLocked) return;
                e.preventDefault();
                isDraggingImage = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragStartX = clientX - translateX;
                dragStartY = clientY - translateY;
                imageContainer.style.cursor = 'grabbing';
            }
            function onDragMove(e) {
                if (!isDraggingImage || isImageLocked) return;
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                translateX = clientX - dragStartX;
                translateY = clientY - dragStartY;
                updateImageTransform();
            }
            function onDragEnd() { isDraggingImage = false; imageContainer.style.cursor = 'grab'; }
            imageContainer.addEventListener('touchstart', onDragStart, { passive: false });
            imageContainer.addEventListener('touchmove', onDragMove, { passive: false });
            imageContainer.addEventListener('touchend', onDragEnd);
            imageContainer.addEventListener('mousedown', onDragStart);
            window.addEventListener('mousemove', onDragMove);
            window.addEventListener('mouseup', onDragEnd);

            lockBtn.addEventListener('click', () => {
                isImageLocked = !isImageLocked;
                if (isImageLocked) {
                    imageContainer.classList.add('locked');
                    lockBtn.classList.add('active-toggle');
                    lockBtn.innerHTML = '<span>🔒</span><span>مقفول</span>';
                } else {
                    imageContainer.classList.remove('locked');
                    lockBtn.classList.remove('active-toggle');
                    lockBtn.innerHTML = '<span>🔓</span><span>قفل</span>';
                }
            });

            opacitySlider.addEventListener('input', (e) => {
                traceImage.style.opacity = e.target.value;
                document.getElementById('opacity-value').innerText = e.target.value;
            });
            scaleSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                document.getElementById('scale-value').innerText = currentScale.toFixed(1);
                updateImageTransform();
            });
            brushSize.addEventListener('input', (e) => {
                document.getElementById('brush-value').innerText = e.target.value;
            });

            // --- اختيار الدقة والنسبة ---
            document.querySelectorAll('[data-res]').forEach(el => {
                el.addEventListener('click', () => {
                    document.querySelectorAll('[data-res]').forEach(e => e.classList.remove('active'));
                    el.classList.add('active');
                    currentRes = el.dataset.res;
                    updateDimensions();
                });
            });
            document.querySelectorAll('[data-ratio]').forEach(el => {
                el.addEventListener('click', () => {
                    document.querySelectorAll('[data-ratio]').forEach(e => e.classList.remove('active'));
                    el.classList.add('active');
                    currentRatio = el.dataset.ratio;
                    updateDimensions();
                });
            });

            // --- تشغيل الكاميرا ---
            startBtn.addEventListener('click', async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: { ideal: 'environment' },
                            width: { min: 1920, ideal: 3840 },
                            height: { min: 1080, ideal: 2160 },
                            frameRate: { ideal: 30 }
                        }
                    });
                    video.srcObject = stream;
                    overlay.style.display = 'none';
                    uiPanel.classList.remove('hidden');
                    toggleBtn.style.display = 'flex';
                    uiVisible = true;
                    updateDimensions();
                } catch (err) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                facingMode: { ideal: 'environment' },
                                width: { ideal: 1920 },
                                height: { ideal: 1080 }
                            }
                        });
                        video.srcObject = stream;
                        overlay.style.display = 'none';
                        uiPanel.classList.remove('hidden');
                        toggleBtn.style.display = 'flex';
                        uiVisible = true;
                        updateDimensions();
                    } catch (err2) {
                        alert('تعذر الوصول إلى الكاميرا.');
                    }
                }
            });

            // --- تسجيل الفيديو باستخدام setInterval لتحقيق 30 إطار/ثانية ثابتة ---
            function showError(msg) {
                const toast = document.createElement('div');
                toast.className = 'error-toast';
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            recordBtn.addEventListener('click', () => {
                if (!isRecording) {
                    if (!video.srcObject) { showError('الكاميرا غير متوفرة'); return; }

                    recordCanvas.width = canvas.width;
                    recordCanvas.height = canvas.height;

                    let stream;
                    try { stream = recordCanvas.captureStream(30); } catch (err) { showError('التسجيل غير مدعوم'); return; }

                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    recordedChunks = [];
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `ar-pro-${Date.now()}.webm`;
                        a.click();
                        URL.revokeObjectURL(url);
                        recordedChunks = [];
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.classList.add('recording-indicator');
                    recordBtn.innerHTML = '<span>⏹️</span><span>إيقاف</span>';
                    uiPanel.classList.add('hidden');
                    toggleBtn.innerText = '⬆';
                    uiVisible = false;

                    // بدء عداد الوقت
                    recordingStartTime = Date.now();
                    timerDiv.style.display = 'block';
                    timerInterval = setInterval(() => {
                        const sec = Math.floor((Date.now() - recordingStartTime) / 1000);
                        const min = Math.floor(sec / 60);
                        timerDiv.innerText = `${min.toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;
                    }, 200);

                    // دالة رسم الإطار على recordCanvas
                    function captureFrame() {
                        if (!isRecording) return;
                        const vw = video.videoWidth;
                        const vh = video.videoHeight;
                        if (vw && vh) {
                            const cw = recordCanvas.width;
                            const ch = recordCanvas.height;
                            const vRatio = vw / vh;
                            const cRatio = cw / ch;
                            let drawW, drawH, offsetX, offsetY;
                            if (vRatio > cRatio) {
                                drawH = ch; drawW = drawH * vRatio;
                                offsetX = (cw - drawW) / 2; offsetY = 0;
                            } else {
                                drawW = cw; drawH = drawW / vRatio;
                                offsetX = 0; offsetY = (ch - drawH) / 2;
                            }
                            recordCtx.drawImage(video, offsetX, offsetY, drawW, drawH);
                        }
                        recordCtx.drawImage(canvas, 0, 0);
                    }

                    // نبدأ setInterval بمعدل 30 إطار/ثانية (33.33ms)
                    recordInterval = setInterval(captureFrame, 33); // أقرب لـ 30fps

                } else {
                    // إيقاف التسجيل
                    stopRecording();
                }
            });

            // --- إظهار/إخفاء اللوحة ---
            toggleBtn.addEventListener('click', () => {
                uiVisible = !uiVisible;
                if (uiVisible) {
                    uiPanel.classList.remove('hidden');
                    toggleBtn.innerText = '⬇';
                } else {
                    uiPanel.classList.add('hidden');
                    toggleBtn.innerText = '⬆';
                }
            });

            imageContainer.style.cursor = 'grab';
        })();
    </script>
